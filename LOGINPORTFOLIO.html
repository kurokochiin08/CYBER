<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#050816;
    overflow:hidden;
}

/* Animated Background */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    linear-gradient(45deg,#00f7ff22,#ff00ff22,#00ff8822);
    animation: moveBg 8s linear infinite;
}

@keyframes moveBg{
    0%{transform:translate(-25%,-25%) rotate(0deg);}
    100%{transform:translate(-25%,-25%) rotate(360deg);}
}

.login-box{
    position:relative;
    width:350px;
    padding:40px;
    background:rgba(10,15,35,0.9);
    border:2px solid #00f7ff;
    border-radius:15px;
    box-shadow:
    0 0 15px #00f7ff,
    0 0 30px #00f7ff;
    backdrop-filter: blur(10px);
    z-index:1;
}

.login-box h2{
    text-align:center;
    color:#00f7ff;
    margin-bottom:25px;
    text-shadow:0 0 10px #00f7ff;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-size:14px;
}

.input-box input{
    width:100%;
    padding:12px;
    background:transparent;
    border:1px solid #00f7ff;
    border-radius:8px;
    color:white;
    outline:none;
    transition:0.3s;
}

.input-box input:focus{
    box-shadow:0 0 15px #00f7ff;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00f7ff;
    color:#050816;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#00d9ff;
    box-shadow:
    0 0 15px #00f7ff,
    0 0 30px #00f7ff;
    transform:scale(1.05);
}

.cyber-line{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:3px;
    background:#00f7ff;
    box-shadow:0 0 10px #00f7ff;
}
</style>

</head>
<body>

<div class="login-box">
    <div class="cyber-line"></div>

    <h2>CYBER LOGIN</h2>

    <form action="MARINECORPSPORTFOLIO.html">

        <div class="input-box">
            <label>Username</label>
            <input type="text" name="Username"
                   placeholder="Enter your Username" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" name="Password"
                   placeholder="Enter your Password" required>
        </div>

        <input type="submit" value="ACCESS SYSTEM" class="login-btn">

    </form>
</div>

</body>
</html>
